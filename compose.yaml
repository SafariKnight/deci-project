services:
  postgresql:
    image: postgres:18.4
    restart: always
    env_file: .env.dev
    ports:
      - 6011:5432
    volumes:
      - postgres_data:/var/lib/postgresql/

  mongo:
    image: mongo:8.3.4
    restart: always
    env_file: .env.dev
    ports:
      - 6021:27017
    volumes:
      - mongodb_data:/data/db

volumes:
  postgres_data:
  mongodb_data:
